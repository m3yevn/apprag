<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Docs — Apprag</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a href="/" class="logo">App<strong>rag</strong></a>
        <nav class="nav"><a href="/docs">Docs</a></nav>
      </div>
    </header>
    <main class="docs-main container">
      <h1>Apprag CLI</h1>
      <h2>Install</h2>
      <pre>npm i -g apprag</pre>
      <h2>Generate config</h2>
      <pre>apprag --config</pre>
      <h2>Generate README</h2>
      <pre>apprag</pre>
      <p>Reads <code>apprag.config.js</code> and <code>package.json</code>, writes <code>README.md</code> via Handlebars templates.</p>
      <h2>Config</h2>
      <p>Customize sections, badges, screenshots, and tech stacks in <code>apprag.config.js</code>.</p>
    </main>
  </body>
</html>
